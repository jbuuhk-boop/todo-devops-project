name: Deploy Todo App


on:
  push:
    branches:
      - main


jobs:

  build-and-deploy:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Login Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
        -u "${{ secrets.DOCKER_USERNAME }}" \
        --password-stdin


    - name: Build Frontend Image
      run: |
        docker build \
        -t hisham55990/todo-client:latest \
        ./client


    - name: Push Image
      run: |
        docker push hisham55990/todo-client:latest


    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3

      with:

        host: ${{ secrets.SERVER_IP }}

        username: ubuntu

        key: ${{ secrets.SSH_KEY }}

        script: |

          cd /home/ubuntu/docker-compose-react-nodejs-postgres

          docker compose pull

          docker compose up -d
